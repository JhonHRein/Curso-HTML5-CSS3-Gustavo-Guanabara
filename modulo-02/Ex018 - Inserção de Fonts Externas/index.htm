<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/images/favicon_jr_3.0.png" type="image/x-icon">
    <title>Fontes com Google Fonts</title>
    <style>
        /*Todo  @ é uma regra e precisa estar fora do seletor, na primeira linha do style*/
        @import url('https://fonts.googleapis.com/css2?family=Handlee&family=Pacifico&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Handlee&family=Pacifico&family=Playwrite+NZ+Guides&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        
        body {
            font-family: "Fredericka the Great", serif, Arial, Helvetica, sans-serif;
            font-weight: 400;
            font-style: normal;
        }
        h1 {
            font-family: "Pacifico", cursive;
            font-weight: 600;
            font-style: normal;
            font-size: x-large;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>TÍTULO</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Assumenda et animi necessitatibus fuga molestiae sunt laudantium quos nemo consectetur tempore, illum incidunt repellat soluta sapiente harum similique maiores laborum? Quaerat?</p>
    
</body>
</html>
