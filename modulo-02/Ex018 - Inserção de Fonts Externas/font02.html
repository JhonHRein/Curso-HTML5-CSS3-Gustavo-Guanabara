<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/images/favicon_jr_3.0.png" type="image/x-icon">
    <title>Fontes Externas Cliente</title>
    <style>
        @font-face {
            font-family: 'kissing';
            src: url('../assets/fonts/kissing-season.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        /*Tipos de formatos
        - opentype - (otf)
        - truetype - (ttf)
        - embedded - opentype
        - truetype-aat (Apple Advenced Typography)
        - svg 
        url das fontes precisam obrigatoriamente estar dentro de aspas simples '' .*/
        }

        body {
            font-family: 'kissing', Arial, Helvetica, sans-serif;
            }
            
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 3em;
            }    
        

    </style>
</head>
<body>
    <h1>Titulo</h1>
    <P>Lorem ipsum dolor sit amet consectetur adipisicing elit. Commodi odio iusto suscipit, minus cum labore assumenda voluptatem quis placeat sunt corrupti molestiae dolores quidem, neque eos eveniet esse. Fugiat, perferendis!</P>
</body>
</html>
