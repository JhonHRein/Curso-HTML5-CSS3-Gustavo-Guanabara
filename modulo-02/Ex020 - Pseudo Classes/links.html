<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/images/favicon_jr_3.0.png" type="image/x-icon">
    <title>Links</title>
    <style>
        /*Nota: SELETORES PERSONALIZADOS
        #  = id 
        .  = class
        :  = pseudo-class
        :: = pseudo-element
        >  = Children/filho*/

        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        a {
            color: rgb(6, 42, 223);
            text-decoration: none;
            font-weight: bold;
        }
        
        a:visited {
            color: #0fe80898;
        }
        a:hover {
            color: black;
            text-decoration: underline;
        }
        a:active {
            color: yellow;
        }
        /*duas vezes dois pontos é um pseudo elemento*/
        a::after {
            content: '[link]'; /*Content = Conteudo; adiciona algo na frente do link*/
            text-decoration: none;
            font-weight: normal;
            color: aqua;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio github</a></li>
    <li><a href="https://youtube.com/cursoemvideo/" target="_blank">Canal do Youtube</a></li>
    <li><a href="https://www.cursoemvideo.com." target="_blank">Site do curso em video</a></li>
</body>
</html>
