<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }
        
        div:hover > p {
            display: block;
            color: white;
            background-color: #ec1212;
        }
        
        div:hover {
            color: #ec1212;
        }

        /*lembrete quando for fazer o paragrafo, lembrar de ter espaço no texto para que o mouse tenha espaço para ativar o div.*/
    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <div>
        <span>Passe o mouse aqui para ver o texto</span>
        <p>Lorem ipsum dolor sit amet...</p>
    </div>
    <p>Fim do exemplo</p>
</body>
</html>
